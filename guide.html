<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1A2E">
<title>Parcours - Guide</title>
<style>
:root{--midnight:#1A1A2E;--lumiere:#F5C842;--lumiere-dim:rgba(245,200,66,0.15);--ivory:#F7F5F0;--dusk:#6B6B80;--dusk-light:#9898A8;--white:#FFFFFF;--border:rgba(0,0,0,0.08);--radius:14px;--radius-sm:8px;--font:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Segoe UI',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--ivory);min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--midnight);padding:20px;}
.login-box{background:rgba(255,255,255,0.05);border-radius:24px;padding:40px 32px;width:100%;max-width:340px;border:0.5px solid rgba(255,255,255,0.1);text-align:center;}
.login-logo{font-size:28px;font-weight:700;color:var(--white);letter-spacing:-1px;margin-bottom:4px;}
.login-logo span{color:var(--lumiere);}
.login-badge{font-size:11px;color:var(--lumiere);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:28px;background:var(--lumiere-dim);padding:4px 12px;border-radius:20px;display:inline-block;}
.login-sub{font-size:13px;color:var(--dusk-light);margin-bottom:24px;line-height:1.5;}
.login-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);color:var(--white);font-size:22px;font-family:var(--font);font-weight:700;letter-spacing:0.2em;text-align:center;outline:none;margin-bottom:14px;transition:border-color 0.15s;}
.login-input:focus{border-color:var(--lumiere);}
.login-input::placeholder{font-size:14px;font-weight:400;letter-spacing:0.05em;color:var(--dusk);}
.login-btn{width:100%;padding:14px;background:var(--lumiere);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;color:var(--midnight);cursor:pointer;font-family:var(--font);}
.login-err{font-size:12px;color:#F07070;margin-top:12px;display:none;}
.login-checking{font-size:12px;color:var(--lumiere);margin-top:12px;display:none;}
.app{display:none;min-height:100vh;flex-direction:column;}
.header{background:var(--midnight);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
.header-logo{font-size:18px;font-weight:700;color:var(--white);}
.header-logo span{color:var(--lumiere);}
.header-badge{font-size:10px;color:var(--midnight);background:var(--lumiere);padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:0.05em;}
.header-logout{font-size:12px;color:var(--dusk-light);background:none;border:none;cursor:pointer;font-family:var(--font);}
.tabs{background:var(--midnight);display:flex;padding:0 20px 16px;gap:8px;}
.tab-btn{padding:8px 16px;border-radius:20px;border:0.5px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.tab-btn.active{background:var(--lumiere);color:var(--midnight);border-color:var(--lumiere);font-weight:600;}
.content{flex:1;overflow-y:auto;padding:20px;}
.content::-webkit-scrollbar{display:none;}
.panel{display:none;}
.panel.active{display:block;}
.day-header{background:var(--midnight);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.day-title{font-size:14px;font-weight:600;color:var(--white);}
.day-hotel{font-size:12px;color:var(--lumiere);}
.day-nav{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:6px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--white);color:var(--dusk);font-size:13px;cursor:pointer;font-family:var(--font);}
.day-btn.active{background:var(--midnight);color:var(--lumiere);border-color:var(--midnight);}
.event-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:0.5px solid var(--border);}
.event-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.event-time{font-size:11px;color:var(--lumiere);font-weight:700;background:var(--lumiere-dim);padding:2px 8px;border-radius:20px;}
.event-type{font-size:10px;color:var(--dusk);text-transform:uppercase;}
.event-name{font-size:14px;font-weight:600;color:var(--midnight);margin-bottom:3px;}
.event-detail{font-size:12px;color:var(--dusk);line-height:1.5;}
.event-note{margin-top:8px;padding:8px 10px;background:var(--ivory);border-radius:var(--radius-sm);font-size:11px;color:var(--dusk);line-height:1.5;border-left:2px solid var(--lumiere);}
.msg-section{background:var(--midnight);border-radius:var(--radius);padding:20px;}
.msg-title{font-size:14px;font-weight:600;color:var(--lumiere);margin-bottom:4px;}
.msg-sub{font-size:12px;color:var(--dusk-light);margin-bottom:16px;}
.msg-thread{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;max-height:300px;overflow-y:auto;}
.msg-bubble{border-radius:12px;padding:10px 14px;}
.msg-bubble-op{background:rgba(245,200,66,0.12);margin-left:30px;}
.msg-bubble-op .msg-from{font-size:10px;color:var(--lumiere);font-weight:600;margin-bottom:4px;}
.msg-bubble-op .msg-text{font-size:13px;color:var(--lumiere);}
.msg-bubble-guide{background:rgba(255,255,255,0.08);}
.msg-bubble-guide .msg-from{font-size:10px;color:var(--dusk-light);font-weight:600;margin-bottom:4px;}
.msg-bubble-guide .msg-text{font-size:13px;color:rgba(255,255,255,0.85);}
.msg-time{font-size:10px;color:var(--dusk);margin-top:4px;text-align:right;}
.reply-area{display:flex;gap:8px;}
.reply-input{flex:1;padding:11px 14px;border:0.5px solid rgba(255,255,255,0.12);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--white);background:rgba(255,255,255,0.06);outline:none;}
.reply-input::placeholder{color:var(--dusk);}
.reply-send{padding:11px 18px;background:var(--lumiere);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--midnight);cursor:pointer;font-family:var(--font);}
.broadcast-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:0.5px solid var(--border);border-left:3px solid var(--lumiere);}
.broadcast-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.broadcast-sender{font-size:12px;font-weight:600;color:var(--midnight);}
.broadcast-time{font-size:11px;color:var(--dusk);}
.broadcast-text{font-size:13px;color:var(--midnight);line-height:1.5;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--midnight);color:var(--white);padding:12px 24px;border-radius:30px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;border:0.5px solid rgba(245,200,66,0.3);}
.toast.show{opacity:1;}
.section-label{font-size:11px;font-weight:600;color:var(--dusk);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">par<span>c</span>ours</div>
    <div class="login-badge">Guide Access</div>
    <div class="login-sub">Enter your guide access code for this programme</div>
    <input class="login-input" id="guide-code" type="text" placeholder="GUIDE" maxlength="10" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Access programme</button>
    <div class="login-err" id="login-err">Code not recognised. Please contact your programme director.</div>
    <div class="login-checking" id="login-checking">Verifying...</div>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="header">
    <div>
      <div class="header-logo">par<span>c</span>ours</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="header-badge">Guide View</span>
      <button class="header-logout" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showPanel('itinerary')" id="tab-itinerary">Today's programme</button>
    <button class="tab-btn" onclick="showPanel('channel')" id="tab-channel">Private channel</button>
    <button class="tab-btn" onclick="showPanel('broadcasts')" id="tab-broadcasts">Guest messages</button>
  </div>
  <div class="content">

    <div class="panel active" id="panel-itinerary">
      <div class="day-nav" id="guide-day-nav"></div>
      <div id="guide-day-content"></div>
    </div>

    <div class="panel" id="panel-channel">
      <div class="msg-section">
        <div class="msg-title">Private channel</div>
        <div class="msg-sub">Only you and the programme director can see these messages</div>
        <div class="msg-thread" id="guide-thread"></div>
        <div class="reply-area">
          <input class="reply-input" id="guide-reply" placeholder="Message your programme director..." onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="reply-send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-broadcasts">
      <div class="section-label">Messages sent to guests</div>
      <div id="broadcasts-list"></div>
    </div>

  </div>
</div>

<script>
var PROJECT = 'raven-cedar-lumio';
var BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT + '/databases/(default)/documents';
var currentDay = 1;
var itinerary = [];
var guideMessages = [];
var broadcasts = [];
var pollInterval = null;

function fromFirestore(val) {
  if (!val) return null;
  if ('stringValue' in val) return val.stringValue;
  if ('integerValue' in val) return parseInt(val.integerValue);
  if ('doubleValue' in val) return val.doubleValue;
  if ('booleanValue' in val) return val.booleanValue;
  if ('nullValue' in val) return null;
  if ('arrayValue' in val) return (val.arrayValue.values || []).map(fromFirestore);
  if ('mapValue' in val) {
    var obj = {};
    for (var k in val.mapValue.fields) obj[k] = fromFirestore(val.mapValue.fields[k]);
    return obj;
  }
  return null;
}

function firestoreVal(val) {
  if (typeof val === 'string') return { stringValue: val };
  if (typeof val === 'number') return { integerValue: val };
  if (typeof val === 'boolean') return { booleanValue: val };
  return { nullValue: null };
}

async function fsGet(path) {
  var r = await fetch(BASE + '/' + path);
  if (!r.ok) throw new Error('Not found');
  var data = await r.json();
  var obj = {};
  for (var k in data.fields) obj[k] = fromFirestore(data.fields[k]);
  return obj;
}

async function fsList(col) {
  var r = await fetch(BASE + '/' + col);
  if (!r.ok) return [];
  var data = await r.json();
  if (!data.documents) return [];
  return data.documents.map(function(doc) {
    var obj = { id: doc.name.split('/').pop() };
    for (var k in doc.fields) obj[k] = fromFirestore(doc.fields[k]);
    return obj;
  });
}

async function fsAdd(col, obj) {
  var fields = {};
  for (var k in obj) fields[k] = firestoreVal(obj[k]);
  var r = await fetch(BASE + '/' + col, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: fields })
  });
  return r.json();
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

window.doLogin = async function() {
  var code = document.getElementById('guide-code').value.trim().toUpperCase();
  if (!code) return;
  document.getElementById('login-err').style.display = 'none';
  document.getElementById('login-checking').style.display = 'block';
  try {
    var settings = await fsGet('programme/settings');
    var guideCode = (settings.guideCode || 'GUIDE2026').toUpperCase();
    document.getElementById('login-checking').style.display = 'none';
    if (code !== guideCode) {
      document.getElementById('login-err').style.display = 'block';
    } else {
      sessionStorage.setItem('parcours_guide', 'authenticated');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initGuide();
    }
  } catch(e) {
    document.getElementById('login-checking').style.display = 'none';
    document.getElementById('login-err').textContent = 'Connection error. Please try again.';
    document.getElementById('login-err').style.display = 'block';
  }
};

window.doLogout = function() {
  sessionStorage.removeItem('parcours_guide');
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('guide-code').value = '';
};

window.addEventListener('load', function() {
  if (sessionStorage.getItem('parcours_guide') === 'authenticated') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initGuide();
  }
});

async function initGuide() {
  try {
    var settings = await fsGet('programme/settings');
    var startStr = settings.startDate || '2026-09-12';
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var start = new Date(startStr);
    start.setHours(0, 0, 0, 0);
    var diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
    currentDay = Math.min(Math.max(diff + 1, 1), 7);
  } catch(e) {}
  await loadItinerary();
  await loadMessages();
  await loadBroadcasts();
  pollInterval = setInterval(async function() {
    await loadMessages();
    await loadBroadcasts();
  }, 8000);
}

async function loadItinerary() {
  try {
    var data = await fsGet('programme/itinerary');
    if (data && data.days) {
      itinerary = data.days;
      buildDayNav();
      buildDayContent();
    }
  } catch(e) {}
}

function buildDayNav() {
  var nav = document.getElementById('guide-day-nav');
  nav.innerHTML = itinerary.map(function(d, i) {
    var title = d.titleEn || ('Day ' + (i + 1));
    var short = title.split(' - ')[0].trim();
    return '<button class="day-btn' + (i === currentDay - 1 ? ' active' : '') + '" onclick="setDay(' + (i + 1) + ')">' + short + '</button>';
  }).join('');
}

function buildDayContent() {
  var body = document.getElementById('guide-day-content');
  var day = itinerary[currentDay - 1];
  if (!day) { body.innerHTML = '<p style="color:var(--dusk);font-size:13px;">No itinerary for this day.</p>'; return; }
  var events = day.events || [];
  body.innerHTML = '<div class="day-header"><div><div class="day-title">' + (day.titleEn || '') + '</div><div class="day-hotel">' + (day.hotel || '') + '</div></div><div style="font-size:22px;">&#128197;</div></div>' +
    events.map(function(ev) {
      return '<div class="event-card">' +
        '<div class="event-top"><span class="event-time">' + (ev.time || '') + '</span><span class="event-type">' + (ev.typeEn || '') + '</span></div>' +
        '<div class="event-name">' + (ev.nameEn || '') + '</div>' +
        '<div class="event-detail">' + (ev.detailEn || '') + '</div>' +
        (ev.noteEn ? '<div class="event-note">' + ev.noteEn + '</div>' : '') +
        '</div>';
    }).join('');
}

window.setDay = function(n) {
  currentDay = n;
  buildDayNav();
  buildDayContent();
};

async function loadMessages() {
  var msgs = await fsList('guide');
  msgs.sort(function(a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });
  guideMessages = msgs;
  renderMessages();
}

function renderMessages() {
  var el = document.getElementById('guide-thread');
  if (!guideMessages.length) {
    el.innerHTML = '<p style="color:var(--dusk-light);font-size:13px;text-align:center;padding:20px 0;">No messages yet. Send a message to your programme director.</p>';
    return;
  }
  el.innerHTML = guideMessages.map(function(m) {
    var isOp = m.from === 'operator';
    return '<div class="msg-bubble ' + (isOp ? 'msg-bubble-op' : 'msg-bubble-guide') + '">' +
      '<div class="msg-from">' + (isOp ? 'Programme director' : 'You') + '</div>' +
      '<div class="msg-text">' + (m.text || '') + '</div>' +
      '<div class="msg-time">' + (m.time || '') + '</div>' +
      '</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

window.sendMessage = async function() {
  var input = document.getElementById('guide-reply');
  var msg = input.value.trim();
  if (!msg) return;
  await fsAdd('guide', {
    from: 'guide',
    text: msg,
    timestamp: Date.now(),
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  });
  input.value = '';
  await loadMessages();
  toast('Message sent');
};

async function loadBroadcasts() {
  var msgs = await fsList('messages');
  msgs.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
  broadcasts = msgs;
  renderBroadcasts();
}

function renderBroadcasts() {
  var el = document.getElementById('broadcasts-list');
  if (!broadcasts.length) {
    el.innerHTML = '<p style="color:var(--dusk);font-size:13px;text-align:center;padding:20px 0;">No messages sent to guests yet.</p>';
    return;
  }
  el.innerHTML = broadcasts.map(function(m) {
    return '<div class="broadcast-card">' +
      '<div class="broadcast-header"><span class="broadcast-sender">Raven & Cedar</span><span class="broadcast-time">' + (m.time || '') + '</span></div>' +
      '<div class="broadcast-text">' + (m.en || '') + '</div>' +
      (m.fr && m.fr !== m.en ? '<div style="margin-top:6px;font-size:12px;color:var(--dusk);">FR: ' + m.fr + '</div>' : '') +
      '</div>';
  }).join('');
}

window.showPanel = function(name) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
};
</script>
</body>
</html>
